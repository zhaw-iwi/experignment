<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZHAW Experimentzugang</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="assets/app.css">
</head>
<body>
<nav class="navbar navbar-expand-lg student-topbar border-bottom bg-white">
    <div class="student-navbar-inner">
        <span class="navbar-brand mb-0">Experimente</span>
        <div id="studentSessionControls" class="d-flex gap-2 align-items-center ms-lg-auto d-none">
            <span id="currentEmailBadge" class="badge text-bg-light"></span>
            <button id="changeEmailButton" type="button" class="btn btn-outline-secondary btn-sm">Beenden</button>
        </div>
    </div>
</nav>
<main class="app-shell">
    <div class="container py-4 py-md-5">
        <section id="emailPanel" class="panel mx-auto">
            <p class="eyebrow">Experimentteilnahme</p>
            <h1 class="h3 mb-3">Zugang zu Ihren Experimenten</h1>
            <form id="emailForm" novalidate>
                <label for="studentEmail" class="form-label">Studierenden-E-Mail</label>
                <div class="input-group input-group-lg">
                    <input
                        id="studentEmail"
                        class="form-control"
                        type="email"
                        autocomplete="email"
                        placeholder="vorname.nachname@students.zhaw.ch"
                        required
                    >
                    <button id="identifyButton" class="btn btn-primary" type="submit">Anzeigen</button>
                </div>
                <div class="form-text">Es werden nur Adressen mit <code>@students.zhaw.ch</code> akzeptiert.</div>
            </form>
            <div id="entryMessage" class="mt-3 d-none"></div>
        </section>

        <section id="overviewPanel" class="d-none">
            <div class="page-header mb-3">
                <div>
                    <p class="eyebrow mb-1">Übersicht</p>
                    <h1 class="h3 mb-0">Ihre Experimente</h1>
                </div>
            </div>

            <div id="overviewMessage" class="mb-3 d-none"></div>

            <div class="panel overflow-hidden p-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Experiment</th>
                            <th>Bedingung</th>
                            <th>Zugewiesen</th>
                            <th>Datum</th>
                            <th>Angerechnet</th>
                            <th class="text-end">Aktion</th>
                        </tr>
                        </thead>
                        <tbody id="experimentRows"></tbody>
                    </table>
                </div>
            </div>

            <section id="detailPanel" class="panel mt-3 d-none" aria-live="polite"></section>
        </section>
    </div>
</main>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
></script>
<script src="assets/app.js" defer></script>
</body>
</html>
